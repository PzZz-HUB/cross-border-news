name: 每日跨境资讯收集

on:
  schedule:
    # 每天北京时间早晨 8:00 执行 (UTC 时间 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动在 GitHub 页面点击运行

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      
    - name: 配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 运行资讯收集并生成网页
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python main.py
        
    - name: 部署到 GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        keep_files: false
