name: 每日跨境资讯收集

on:
  push:
    branches: [ main ]
  schedule:
    # 每天北京时间早晨 8:00 执行 (UTC 时间 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动在 GitHub 页面点击运行

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      
    - name: 配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 运行资讯收集和邮件发送程序
      env:
        # SMTP_USER 和 SMTP_PASS 需要在 GitHub 的 Settings -> Secrets 中配置
        SMTP_SERVER: smtp.qq.com
        SMTP_PORT: 465
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        TO_EMAIL: ${{ secrets.TO_EMAIL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python main.py
